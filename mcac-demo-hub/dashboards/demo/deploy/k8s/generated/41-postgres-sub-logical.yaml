apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-sub
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: postgres-sub
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: postgres-logical-sub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-sub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-sub
        app.kubernetes.io/part-of: demo-hub
        demo-hub.io/group: postgres-logical-sub
    spec:
      containers:
        - name: postgres-sub
          image: docker.io/bitnamilegacy/postgresql:16.6.0-debian-12-r2
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRESQL_USERNAME
              value: "postgres"
            - name: POSTGRESQL_DATABASE
              value: "demo"
            - name: POSTGRESQL_SHARED_PRELOAD_LIBRARIES
              value: "pgaudit,pg_stat_statements"
            - name: POSTGRESQL_EXTRA_FLAGS
              value: "-c max_logical_replication_workers=8 -c max_worker_processes=16 -c max_sync_workers_per_subscription=4 -c pg_stat_statements.max=10000 -c pg_stat_statements.track=all"
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-hub-credentials
                  key: postgresql-password
          volumeMounts:
            - name: data
              mountPath: /bitnami/postgresql
          ports:
            - containerPort: 5432
              name: pg
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 18
      volumes:
        - name: data
          emptyDir: {}
---

apiVersion: v1
kind: Service
metadata:
  name: postgres-sub
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: postgres-sub
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: postgres-logical-sub
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres-sub
  ports:
    - port: 5432
      targetPort: 5432
      name: pg
