apiVersion: batch/v1
kind: Job
metadata:
  name: dse-config
  namespace: killrvideo
  labels:
    app: dse-config
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: dse-config
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-dse
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z dse 9042; do
                echo "waiting for dse:9042..."
                sleep 5
              done
      containers:
        - name: dse-config
          image: killrvideo/killrvideo-dse-config:3
          env:
            - name: KILLRVIDEO_SERVICE_DISCOVERY_DISABLED
              value: "true"
