apiVersion: apps/v1
kind: Deployment
metadata:
  name: generator
  namespace: killrvideo
  labels:
    app: generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: generator
  template:
    metadata:
      labels:
        app: generator
    spec:
      initContainers:
        - name: wait-for-backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z backend 50101; do
                echo "waiting for backend:50101..."
                sleep 5
              done
      containers:
        - name: generator
          image: killrvideo/killrvideo-generator:3
          env:
            - name: KILLRVIDEO_LOGGING_LEVEL
              value: debug
