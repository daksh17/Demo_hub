apiVersion: apps/v1
kind: Deployment
metadata:
  name: hub-demo-ui
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: hub-demo-ui
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: hub-demo-ui
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hub-demo-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hub-demo-ui
        app.kubernetes.io/part-of: demo-hub
        demo-hub.io/group: hub-demo-ui
    spec:
      initContainers:
        - name: wait-hub-deps
          image: alpine:3.19
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache netcat-openbsd >/dev/null
              for i in $(seq 1 200); do
                if nc -z -w 2 kafka.demo-hub.svc.cluster.local 9092 2>/dev/null \
                  && nc -z -w 2 opensearch.demo-hub.svc.cluster.local 9200 2>/dev/null \
                  && nc -z -w 2 postgresql-primary.demo-hub.svc.cluster.local 5432 2>/dev/null \
                  && nc -z -w 2 cassandra.demo-hub.svc.cluster.local 9042 2>/dev/null \
                  && nc -z -w 2 redis.demo-hub.svc.cluster.local 6379 2>/dev/null \
                  && nc -z -w 2 mongo-mongos1.demo-hub.svc.cluster.local 27017 2>/dev/null; then
                  exit 0
                fi
                sleep 2
              done
              echo "timeout waiting for kafka:9092, opensearch:9200, postgresql-primary:5432," >&2
              echo "  cassandra:9042, redis:6379, mongo-mongos1:27017" >&2
              exit 1
      containers:
        - name: hub-demo-ui
          image: mcac-demo/hub-demo-ui:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MONGO_URI
              value: "mongodb://mongo-mongos1:27017"
            - name: CASSANDRA_HOSTS
              value: "cassandra-0.cassandra-headless.demo-hub.svc.cluster.local,cassandra-1.cassandra-headless.demo-hub.svc.cluster.local,cassandra-2.cassandra-headless.demo-hub.svc.cluster.local"
            - name: CASSANDRA_KEYSPACE
              value: "demo_hub"
            - name: OPENSEARCH_URL
              value: "http://opensearch:9200"
            - name: OPENSEARCH_INDEX
              value: "hub-orders"
            - name: KAFKA_BOOTSTRAP
              value: "kafka:9092"
            - name: CASSANDRA_WORKLOAD_REQUEST_TIMEOUT_SECONDS
              value: "300"
            - name: CASSANDRA_WORKLOAD_INTER_BATCH_SLEEP_MS
              value: "25"
            - name: CASSANDRA_WORKLOAD_WRITE_RETRIES
              value: "3"
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: demo-hub-credentials
                  key: hub-postgres-dsn
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: demo-hub-credentials
                  key: hub-redis-url
          ports:
            - containerPort: 8888
              name: http
---

apiVersion: v1
kind: Service
metadata:
  name: hub-demo-ui
  namespace: demo-hub
  labels:
    app.kubernetes.io/name: hub-demo-ui
    app.kubernetes.io/part-of: demo-hub
    demo-hub.io/group: hub-demo-ui
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hub-demo-ui
  ports:
    - port: 8888
      targetPort: 8888
      name: http
